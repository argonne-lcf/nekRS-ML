# Database config
database:
    launch: True
    backend: "redis"
    deployment: "colocated"
    port: 6782
    network_interface: "uds"
    exp_name: "nekRS-ML"
    launcher: "pals"

# Run config
run_args:
    nodes: 1
    db_nodes: 1
    sim_nodes: 1
    ml_nodes: 1
    simprocs: 2
    simprocs_pn: 2
    mlprocs: 2
    mlprocs_pn: 2
    dbprocs_pn: 4
    sim_cpu_bind: "list:1:8:16:24:32:40"
    ml_cpu_bind: "list:53:60:68:76:84:92"
    db_cpu_bind: [100,101,102,103]

# Simulation config
sim:
    executable: "/home/balin/.local/nekrs//bin/nekrs"
    affinity: ""
    arguments: "--setup tgv.par --backend dpcpp "
    copy_files: ["./tgv.usr","./tgv.par","./tgv.udf","./tgv.re2"]
    link_files: [".cache"]

# Trainer config
train:
    executable: "/home/balin/.local/nekrs//3rd_party/gnn/dist-gnn/main.py"
    affinity: ""
    arguments: "device_skip=2 halo_swap_mode=all_to_all_opt layer_norm=True online=True client.db_nodes=1 consistency=True target_loss=2.706e-04 verbose=True"
    copy_files: []
    link_files: []
