# Database config
database:
    launch: True
    backend: "redis"
    deployment: "colocated"
    port: 6782
    network_interface: "uds"
    exp_name: "nekRS-ML"
    launcher: "pals"

# Run config
run_args:
    nodes: 1
    db_nodes: 1
    sim_nodes: 1
    ml_nodes: 1
    simprocs: 6
    simprocs_pn: 6
    mlprocs: 6
    mlprocs_pn: 6
    dbprocs_pn: 4
    sim_cpu_bind: "list:1:8:16:24:32:40"
    ml_cpu_bind: "list:53:60:68:76:84:92"
    db_cpu_bind: [100,101,102,103]

# Simulation config
sim:
    affinity: ""
    executable: "/home/balin/.local/nekrs//bin/nekrs"
    arguments: "--setup turbChannel.par --backend dpcpp "
    copy_files: ["./turbChannel.usr","./turbChannel.par","./turbChannel.udf","./turbChannel.re2"]
    link_files: [".cache"]

# Trainer config
train:
    executable: "/home/balin/.local/nekrs//3rd_party/gnn/dist-gnn/main.py"
    affinity: ""
    arguments: "device_skip=6 halo_swap_mode=all_to_all_opt online=True client.db_nodes=1 consistency=True time_dependency=time_dependent verbose=True"
    copy_files: []
    link_files: []

# Inference config
inference:
    executable: "/home/balin/.local/nekrs//3rd_party/gnn/dist-gnn/inference.py"
    affinity: ""
    arguments: "model_task=inference rollout_steps=100 halo_swap_mode=all_to_all_opt online=True client.db_nodes=1 consistency=True time_dependency=time_dependent verbose=True"
    copy_files: []
    link_files: []
